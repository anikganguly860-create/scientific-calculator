<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Advanced Scientific Calculator</title>

<!-- Chart.js for graphs -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  transition:0.3s;
}
.dark{background:#0f172a;color:white;}
.light{background:#f1f5f9;color:black;}

.calculator{
  width:380px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
  transition:0.2s;
}
#clock{
  text-align:center;
  margin-bottom:10px;
  font-weight:bold;
  color:#38bdf8;
  font-size:18px;
}
#display{
  width:100%;
  height:60px;
  font-size:24px;
  text-align:right;
  border:none;
  border-radius:10px;
  padding:10px;
  margin-bottom:10px;
  background:#020617;
  color:#22c55e;
  box-shadow:inset 0 0 10px black;
  transition:0.2s;
}
.buttons{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
}
button{
  padding:12px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#334155;
  color:white;
  transition:0.15s;
  cursor:pointer;
}
button:hover{transform:scale(1.05); background:#475569;}
button:active{transform:scale(0.9);}
.equal{background:#22c55e;}
.clear{background:#ef4444;}
.graphBtn{background:#6366f1;}
.themeBtn{background:#f59e0b;}
.currencyBtn{background:#10b981;}
#graphBox{display:none;margin-top:10px;}
#currencyBox{display:none;margin-top:10px;}
canvas{border-radius:10px;}
</style>

</head>
<body class="dark">

<div class="calculator">

<div id="clock"></div>

<input id="display" disabled>

<div class="buttons">

<button onclick="insert('7')">7</button>
<button onclick="insert('8')">8</button>
<button onclick="insert('9')">9</button>
<button onclick="insert('/')">÷</button>
<button onclick="insert('x')">x</button>

<button onclick="insert('4')">4</button>
<button onclick="insert('5')">5</button>
<button onclick="insert('6')">6</button>
<button onclick="insert('*')">×</button>
<button onclick="insert('(')">(</button>

<button onclick="insert('1')">1</button>
<button onclick="insert('2')">2</button>
<button onclick="insert('3')">3</button>
<button onclick="insert('-')">-</button>
<button onclick="insert(')')">)</button>

<button onclick="insert('0')">0</button>
<button onclick="insert('.')">.</button>
<button onclick="calculate()" class="equal">=</button>
<button onclick="clearDisplay()" class="clear">C</button>
<button onclick="insert('+')">+</button>

<!-- Scientific functions -->
<button onclick="insert('Math.sin(')">sin</button>
<button onclick="insert('Math.cos(')">cos</button>
<button onclick="insert('Math.tan(')">tan</button>
<button onclick="insert('1/Math.cos(')">sec</button>
<button onclick="insert('1/Math.sin(')">cosec</button>

<button onclick="insert('1/Math.tan(')">cot</button>
<button onclick="insert('Math.log10(')">log</button>
<button onclick="insert('Math.log(')">ln</button>
<button onclick="insert('Math.sqrt(')">√</button>
<button onclick="factorial()">n!</button>

<!-- Extra options -->
<button class="graphBtn" onclick="toggleGraph()">Graph</button>
<button class="currencyBtn" onclick="toggleCurrency()">Currency</button>
<button class="themeBtn" onclick="toggleTheme()">Theme</button>

</div>

<!-- Graph Panel -->
<div id="graphBox">
<canvas id="chart"></canvas>
<button onclick="closeGraph()">Close Graph</button>
</div>

<!-- Currency Converter -->
<div id="currencyBox">
<select id="fromCurrency"></select>
<select id="toCurrency"></select>
<input id="amount" type="number" placeholder="Amount">
<button onclick="convertCurrency()">Convert</button>
<div id="result"></div>
<button onclick="closeCurrency()">Close Currency</button>
</div>

</div>

<script>
// Clock
function updateClock(){
  document.getElementById('clock').innerText=new Date().toLocaleTimeString();
}
setInterval(updateClock,1000);

// Calculator
let display=document.getElementById("display")
let chart;

function insert(v){display.value+=v}
function clearDisplay(){display.value=""}

function calculate(){
  try{
    let exp=display.value;
    let result=eval(exp);
    display.value=result;
  }catch{display.value="Error";}
}

// Factorial
function factorial(){
  let n=parseInt(display.value); if(n<0){display.value="Error";return;}
  let f=1; for(let i=1;i<=n;i++){f*=i;}
  display.value=f;
}

// Theme
function toggleTheme(){
  document.body.classList.toggle('dark');
  document.body.classList.toggle('light');
}

// Graph
function toggleGraph(){
  let g=document.getElementById("graphBox");
  if(g.style.display==="block"){g.style.display="none";}else{g.style.display="block"; drawGraph();}
}
function closeGraph(){document.getElementById("graphBox").style.display="none";}
function drawGraph(){
  let exp=display.value;
  if(!exp.includes("x")){alert("Enter function with x"); return;}
  let x=[], y=[];
  for(let i=-10;i<=10;i+=0.1){
    x.push(i);
    try{y.push(eval(exp.replace(/x/g,"("+i+")")));}catch{y.push(null);}
  }
  if(chart) chart.destroy();
  chart=new Chart(document.getElementById("chart"),{
    type:'line',
    data:{labels:x,datasets:[{label:'Graph',data:y,borderWidth:2}]},
    options:{plugins:{zoom:{zoom:{wheel:{enabled:true},pinch:{enabled:true},mode:'xy'},pan:{enabled:true,mode:'xy'}}}}
  });
}

// Currency
const currencies=['USD','EUR','GBP','INR','JPY','CNY','AUD','CAD','CHF','SGD','NZD','MXN','BRL','ZAR','RUB','KRW'];
const fromC=document.getElementById('fromCurrency');
const toC=document.getElementById('toCurrency');
currencies.forEach(c=>{fromC.innerHTML+=`<option>${c}</option>`;toC.innerHTML+=`<option>${c}</option>`;});
function toggleCurrency(){document.getElementById("currencyBox").style.display='block';}
function closeCurrency(){document.getElementById("currencyBox").style.display='none';}
function convertCurrency(){
  let from=fromC.value,to=toC.value,amt=parseFloat(document.getElementById("amount").value);
  if(isNaN(amt)){alert("Enter amount"); return;}
  // For simplicity we use static conversion rates. In real app, use API.
  const rates={'USD':1,'EUR':0.91,'GBP':0.82,'INR':82,'JPY':146,'CNY':6.9,'AUD':1.5,'CAD':1.36,'CHF':0.92,'SGD':1.35,'NZD':1.62,'MXN':17.5,'BRL':5.1,'ZAR':19.1,'RUB':78,'KRW':1310};
  let result=amt/rates[from]*rates[to];
  document.getElementById("result").innerText=`${amt} ${from} = ${result.toFixed(2)} ${to}`;
}
</script>

</body>
</html>

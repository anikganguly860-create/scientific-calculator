<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Advanced Scientific Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#0f172a;
color:white;
transition:0.3s;
}

.light{
background:#f1f5f9;
color:black;
}

.calculator{
background:#1e293b;
padding:20px;
border-radius:15px;
width:360px;
box-shadow:0 0 20px black;
}

.light .calculator{
background:white;
}

#clock{
text-align:center;
color:#38bdf8;
margin-bottom:10px;
}

#display{
width:100%;
height:55px;
font-size:22px;
border:none;
border-radius:10px;
padding:10px;
margin-bottom:10px;
text-align:right;
background:#020617;
color:white;
}

.light #display{
background:#e2e8f0;
color:black;
}

.buttons{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}

button{
padding:12px;
font-size:14px;
border:none;
border-radius:8px;
background:#334155;
color:white;
}

button:hover{
background:#475569;
}

.equal{background:#22c55e;}
.clear{background:#ef4444;}
.graph{background:#6366f1;}
.theme{background:#f59e0b;}

.history{
margin-top:10px;
max-height:120px;
overflow:auto;
background:#020617;
padding:10px;
border-radius:10px;
font-size:13px;
}

.light .history{
background:#e2e8f0;
}

#graphPanel{
display:none;
margin-top:10px;
}

canvas{
background:white;
border-radius:10px;
}

</style>
</head>

<body>

<div class="calculator">

<div id="clock"></div>

<input id="display" disabled>

<div class="buttons">

<button onclick="insert('7')">7</button>
<button onclick="insert('8')">8</button>
<button onclick="insert('9')">9</button>
<button onclick="insert('/')">÷</button>
<button class="clear" onclick="clearDisplay()">C</button>

<button onclick="insert('4')">4</button>
<button onclick="insert('5')">5</button>
<button onclick="insert('6')">6</button>
<button onclick="insert('*')">×</button>
<button onclick="insert('Math.sqrt(')">√</button>

<button onclick="insert('1')">1</button>
<button onclick="insert('2')">2</button>
<button onclick="insert('3')">3</button>
<button onclick="insert('-')">-</button>
<button onclick="insert('Math.pow(')">xʸ</button>

<button onclick="insert('0')">0</button>
<button onclick="insert('.')">.</button>
<button class="equal" onclick="calculate()">=</button>
<button onclick="insert('+')">+</button>
<button onclick="insert('Math.sin(')">sin</button>

<button onclick="insert('Math.cos(')">cos</button>
<button onclick="insert('Math.tan(')">tan</button>
<button onclick="insert('Math.log(')">log</button>
<button onclick="insert('(')">(</button>
<button onclick="insert(')')">)</button>

<button class="graph" onclick="toggleGraph()">Graph</button>
<button class="theme" onclick="toggleTheme()">Theme</button>

</div>

<div class="history">
<b>History</b>
<div id="history"></div>
</div>

<div id="graphPanel">
<canvas id="chart"></canvas>
<button onclick="closeGraph()" style="margin-top:5px;width:100%">Close Graph</button>
</div>

</div>

<script>

let display=document.getElementById("display")
let historyBox=document.getElementById("history")

function insert(v){
display.value+=v
}

function clearDisplay(){
display.value=""
}

function calculate(){

try{

let exp=display.value
let result=eval(exp)

display.value=result

saveHistory(exp+" = "+result)

}catch{
display.value="Error"
}

}

function saveHistory(text){

let history=JSON.parse(localStorage.getItem("calcHistory"))||[]

history.push(text)

localStorage.setItem("calcHistory",JSON.stringify(history))

loadHistory()

}

function loadHistory(){

let history=JSON.parse(localStorage.getItem("calcHistory"))||[]

historyBox.innerHTML=history.join("<br>")

}

loadHistory()

function updateClock(){
let now=new Date()
document.getElementById("clock").innerText=now.toLocaleTimeString()
}

setInterval(updateClock,1000)

function toggleTheme(){
document.body.classList.toggle("light")
}

function toggleGraph(){

let panel=document.getElementById("graphPanel")

panel.style.display="block"

drawGraph()

}

function closeGraph(){
document.getElementById("graphPanel").style.display="none"
}

function drawGraph(){

let exp=display.value

let x=[]
let y=[]

for(let i=-10;i<=10;i++){

x.push(i)

try{
y.push(eval(exp.replace(/x/g,i)))
}catch{
y.push(null)
}

}

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:x,
datasets:[{
label:"Graph",
data:y
}]
}
})

}

</script>

</body>
</html>
